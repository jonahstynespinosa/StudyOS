<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="header">StudyOS</h1>
  <p>Welcome to StudyOS, your personal study assistant!</p>
  <div class="btnContainer">
    <button id="load-assignment" class="load-assignments">
      Load Assignments
    </button>
    <button class="load-assignments" id="showCompleted">Show Completed</button>
    <button id="showAll" class="load-assignments">Show All</button>
    <button id="clearData" class="load-assignments">Clear Data</button>
  </div>
  <div class="searchContainer" id="searchContainer">
    <input type="text" id="searchInput" placeholder="Search assignments..." class="searchInput">
    <button id="searchBtn" class="searchBtn">Search</button>
  </div>

<div id="dataSet" class="dataSet"></div>

<script src="script.js"></script>  
</body>
</html>
